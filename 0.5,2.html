    <style>

        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; color: #e0e0e0; overflow: hidden; }

        .auth-buttons .btn { flex: 1; }

        .frozen-screen { width: 100%; height: 100vh; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; text-align: center; position: fixed; top: 0; left: 0; z-index: 999; }
        .frozen-screen .snowflake { font-size: 100px; animation: shake 0.6s infinite; }
        @keyframes shake { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
        .frozen-screen h2 { color: #e74c3c; font-size: 26px; margin: 20px 0 8px; }
        .frozen-screen .subtitle { color: #a0a0c0; font-size: 16px; margin-bottom: 8px; }

        .admin-badge { background: #e74c3c; padding: 6px 12px; border-radius: 16px; font-size: 12px; font-weight: bold; }
        .coins-badge { background: #f39c12; padding: 6px 12px; border-radius: 16px; font-size: 12px; font-weight: bold; }

        .chat-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 14px; cursor: pointer; margin-bottom: 4px; }
        .chat-item:active { background: #2a2a3e; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; color: white; background: #6c5ce7; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 14px; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .empty-chats { text-align: center; color: #6e6e8a; padding: 50px 16px; font-size: 14px; }

        .chat-header { padding: 10px; border-bottom: 1px solid #2a2a40; display: flex; align-items: center; gap: 8px; }
        .back-btn { background: #2a2a3c; border: none; color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; background: radial-gradient(circle at 20% 30%, #252538, #1e1e30); }
        .msg { max-width: 80%; padding: 9px 12px; border-radius: 16px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .msg-in { background: #2e2e44; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-out { background: #6c5ce7; align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .msg-sender { font-size: 10px; font-weight: bold; margin-bottom: 2px; color: #b0b0d0; }
        .msg-time { font-size: 9px; opacity: 0.6; margin-top: 2px; text-align: right; }
        .msg img { max-width: 200px; border-radius: 12px; margin-top: 4px; cursor: pointer; }

        .input-area { padding: 8px 10px; display: flex; gap: 6px; align-items: center; border-top: 1px solid #2a2a40; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
        .input-area input[type="text"] { flex: 1; padding: 11px 14px; border-radius: 20px; border: none; background: #2a2a3c; color: white; font-size: 14px; outline: none; }
        .attach-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #2a2a3c; color: white; font-size: 20px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .send-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #6c5ce7; color: white; font-size: 18px; cursor: pointer; flex-shrink: 0; }
        #fileInput { display: none; }

        .bottom-nav { display: flex; background: #1a1a2e; border-top: 1px solid #2a2a40; padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 6px; cursor: pointer; color: #6e6e8a; gap: 2px; font-size: 10px; background: none; border: none; }
        .nav-item.active { color: #6c5ce7; }
        .nav-item span:first-child { font-size: 20px; }

        .profile-inner { padding: 20px; text-align: center; overflow-y: auto; flex: 1; }
        .profile-avatar { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 10px; color: white; background: #6c5ce7; }
        .profile-name { font-size: 18px; font-weight: bold; }
        .profile-id { color: #6c5ce7; font-size: 13px; margin-bottom: 10px; }
        .profile-coins { color: #f39c12; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .section-title { font-weight: bold; color: #c0c0d0; margin: 12px 0 8px; font-size: 13px; text-align: left; }
        .gift-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .gift-card { background: #242436; border-radius: 12px; padding: 10px; text-align: center; position: relative; }
        .gift-card.limited { border: 1px solid #f39c12; }
        .gift-card .gift-badge { position: absolute; top: -8px; right: -8px; background: #e74c3c; color: white; padding: 4px 8px; border-radius: 10px; font-size: 9px; font-weight: bold; }
        .gift-icon { font-size: 30px; }
        .gift-name { font-size: 10px; font-weight: bold; margin: 2px 0; }
        .gift-price { font-size: 10px; color: #f39c12; }
        .gift-stock { font-size: 9px; color: #e74c3c; font-weight: bold; }
        .gift-timer { font-size: 10px; color: #f39c12; font-weight: bold; }
        .my-gifts { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .my-gift { font-size: 28px; padding: 6px; background: #242436; border-radius: 10px; position: relative; cursor: pointer; }
        .my-gift.rare { border: 2px solid #f39c12; animation: glow 1s infinite; }
        @keyframes glow { 0%,100% { box-shadow: 0 0 5px #f39c12; } 50% { box-shadow: 0 0 15px #f39c12; } }
        .task-item { background: #242436; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .task-info { flex: 1; }
        .task-name { font-weight: bold; font-size: 13px; }
        .task-reward { font-size: 11px; color: #f39c12; }
        .task-expires { font-size: 10px; color: #e74c3c; font-weight: bold; }
        .task-done { background: #2ecc71; color: white; border: none; padding: 8px 14px; border-radius: 10px; font-size: 11px; cursor: pointer; }
        .auto-login-bar { background: #2ecc71; color: #1a1a2e; padding: 10px; text-align: center; font-size: 13px; font-weight: bold; cursor: pointer; }

        .notification-toast { position: fixed; top: 20px; right: 20px; left: 20px; background: #6c5ce7; color: white; padding: 14px 18px; border-radius: 14px; z-index: 200; font-weight: bold; font-size: 14px; animation: slideIn 0.3s ease; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.5); cursor: pointer; }
        @keyframes slideIn { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .notif-settings { display: flex; align-items: center; gap: 10px; padding: 10px 0; justify-content: center; }
        .notif-toggle { width: 50px; height: 26px; background: #3a3a50; border-radius: 13px; position: relative; cursor: pointer; }
        .notif-toggle.on { background: #6c5ce7; }
        .notif-toggle::after { content: ''; width: 22px; height: 22px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.2s; }
        .notif-toggle.on::after { left: 26px; }
        .typing-status { font-size: 11px; color: #2ecc71; font-style: italic; padding: 2px 10px; }
    </style>
</head>
<body>

    <div id="frozenScreen" class="frozen-screen hidden">
        <div class="snowflake">❄️</div><h2>Упсс!!!</h2><div class="subtitle">Ваш аккаунт временно заблокирован</div>
        <div class="time-left" id="frozenTimeLeft"></div>
        <button class="btn btn-purple" style="width:200px;" id="frozenBackBtn">🔙 Назад</button>
    </div>

    <div id="authScreen" class="auth-screen">
        <h1>💬</h1><h2>QuickChat v0.5</h2>
        <div id="autoLoginBar" class="auto-login-bar hidden"></div>
        <input type="text" id="authName" placeholder="Твоё имя" maxlength="20">
        <input type="text" id="authId" placeholder="Придумай ID (@username)" maxlength="20">
        <input type="password" id="authPass" placeholder="Пароль" maxlength="20">
        <div class="error" id="authError"></div><div class="success" id="authSuccess"></div>
        <div class="auth-buttons">
            <button class="btn btn-purple" id="loginBtn">🔑 Войти</button>
            <button class="btn btn-outline" id="registerBtn">✨ Регистрация</button>
        </div>
    </div>

    <div id="messenger" class="messenger hidden">
        <div id="chatsScreen" class="screen">
            <div class="top-bar">
                <input type="text" id="searchInput" placeholder="🔍 Поиск по ID"><button id="searchBtn">Найти</button>
                <span class="user-badge" id="userBadge"></span>
                <span class="coins-badge" id="coinsBadge">💎0</span>
                <span class="admin-badge hidden" id="adminBadge">👑</span>
            </div>
            <div class="chat-list" id="chatList"><div class="empty-chats">Найди друга</div></div>
        </div>

        <div id="chatScreen" class="screen hidden">
            <div class="chat-header">
                <button class="back-btn" id="backBtn">←</button><div class="avatar" id="chatAvatar" onclick="viewProfile(activeChat)">?</div>
                <div>
                    <div style="font-weight:bold;" id="chatName"></div>
                    <div class="typing-status" id="typingStatus"></div>
                </div>
                <button class="btn btn-small btn-red hidden" id="adminMenuBtn">⋮</button>
            </div>
            <div class="messages" id="messagesContainer"></div>
            <div class="input-area">
                <input type="file" id="fileInput" accept="image/*">
                <button class="attach-btn" id="attachBtn">📷</button>
                <input type="text" id="messageInput" placeholder="Сообщение..."><button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>

        <div id="profileScreen" class="screen hidden">
            <div class="profile-inner" id="profileContent"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="navChats"><span>💬</span>Чаты</div>
            <div class="nav-item" id="navProfile"><span>👤</span>Профиль</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBXK5QxcIk6GC4TCTzmHxFTr_Tf_5cQv3c",
            authDomain: "quickchat123-51148.firebaseapp.com",
            databaseURL: "https://quickchat123-51148-default-rtdb.firebaseio.com",
            projectId: "quickchat123-51148",
            storageBucket: "quickchat123-51148.firebasestorage.app",
            messagingSenderId: "662177132719",
            appId: "1:662177132719:web:3039b49bcde8987745a45a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const $ = id => document.getElementById(id);
        const ADMIN_ID = '@kotoar';
        const STORAGE_KEY = 'qc_current_user';
        const VAPID_KEY = 'BEZCEcivzktrxaErOQ8IMJHAt4GBnFEJiel-mKcglUuMMizwJiZ6idIYovo9FCVD5mCEAqDl7yxjfdl8kWs4Va4';
        
        let currentUser = null;
        let activeChat = null;
        let viewingProfile = null;
        let frozenTimer = null;
        let liveTimers = {};
        let notificationsEnabled = true;
        let lastMsgCount = {};
        let typingRef = null;
        let typingTimeout = null;
        let typingTimer = null;

        // 🔔 УВЕДОМЛЕНИЕ
        function showNotification(title, body) {
            if (!notificationsEnabled) return;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = 800; osc.type = 'sine'; gain.gain.value = 0.3;
                osc.start(); setTimeout(() => { osc.stop(); audioCtx.close(); }, 200);
            } catch(e) {}
            const toast = document.createElement('div');
            toast.className = 'notification-toast';
            toast.innerHTML = `<strong>${title}</strong><br>${body}`;
            document.body.appendChild(toast);
            toast.addEventListener('click', () => { toast.remove(); if (activeChat !== title) openChat(title); });
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 4000);
        }

        function watchMessages() {
            if (!currentUser) return;
            db.ref('contacts/' + currentUser.id).once('value', snap => {
                const conts = snap.val() || [];
                conts.forEach(uid => {
                    const cid = [currentUser.id, uid].sort().join('_');
                    db.ref('messages/' + cid).limitToLast(1).on('value', snap => {
                        const msgs = snap.val(); if (!msgs) return;
                        const msg = Object.values(msgs)[0]; if (!msg) return;
                        const msgKey = cid + '_' + msg.time;
                        if (lastMsgCount[msgKey]) return;
                        lastMsgCount[msgKey] = true;
                        if (activeChat === uid) return;
                        if (msg.from === currentUser.id) return;
                        db.ref('users/' + uid).once('value', snap => {
                            const u = snap.val();
                            if (u) showNotification(u.name, msg.photoURL ? '📷 Фото' : msg.text);
                        });
                    });
                });
            });
        }

        function startLiveTimer(elementId, expires) {
            if (liveTimers[elementId]) clearInterval(liveTimers[elementId]);
            function update() {
                const el = document.getElementById(elementId);
                if (!el) { clearInterval(liveTimers[elementId]); return; }
                const left = expires - Date.now();
                if (left <= 0) { el.textContent = '⏰ Истёк'; clearInterval(liveTimers[elementId]); return; }
                const d = Math.floor(left/86400000), h = Math.floor((left%86400000)/3600000), m = Math.floor((left%3600000)/60000), s = Math.floor((left%60000)/1000);
                if (d > 0) el.textContent = `⏰ ${d}д ${h}ч ${m}м ${s}с`;
                else if (h > 0) el.textContent = `⏰ ${h}ч ${m}м ${s}с`;
                else if (m > 0) el.textContent = `⏰ ${m}м ${s}с`;
                else el.textContent = `⏰ ${s}с`;
            }
            update(); liveTimers[elementId] = setInterval(update, 1000);
        }

        function saveCurrentUser(uid, name, isAdmin) { localStorage.setItem(STORAGE_KEY, JSON.stringify({ uid, name, isAdmin })); }
        function loadSavedUser() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } }
        function showAutoLogin() {
            const saved = loadSavedUser();
            if (saved) { $('autoLoginBar').classList.remove('hidden'); $('autoLoginBar').textContent = `👤 Войти как ${saved.name} (${saved.uid})`; $('autoLoginBar').onclick = () => autoLogin(saved.uid); }
            else $('autoLoginBar').classList.add('hidden');
        }
        async function autoLogin(uid) {
            db.ref('users/' + uid).once('value', snap => {
                const data = snap.val();
                if (!data || (data.frozen && Date.now() < data.frozen)) { showAutoLogin(); return; }
                currentUser = { id: uid, name: data.name, isAdmin: (uid === ADMIN_ID) };
                db.ref('users/' + uid).update({ online: true });
                db.ref('users/' + uid).onDisconnect().update({ online: false });
                viewingProfile = uid;
                saveCurrentUser(uid, data.name, uid === ADMIN_ID);
                enterApp();
            });
        }

        function showFrozenScreen(until) {
            $('authScreen').classList.add('hidden'); $('messenger').classList.add('hidden'); $('frozenScreen').classList.remove('hidden');
            function update() {
                const left = until - Date.now();
                if (left <= 0) { clearInterval(frozenTimer); $('frozenScreen').classList.add('hidden'); $('authScreen').classList.remove('hidden'); return; }
                const d = Math.floor(left/86400000), h = Math.floor((left%86400000)/3600000), m = Math.floor((left%3600000)/60000), s = Math.floor((left%60000)/1000);
                $('frozenTimeLeft').textContent = `Осталось: ${d}д ${h}ч ${m}м ${s}с`;
            }
            update(); frozenTimer = setInterval(update, 1000);
        }

        $('frozenBackBtn').addEventListener('click', () => { clearInterval(frozenTimer); $('frozenScreen').classList.add('hidden'); $('authScreen').classList.remove('hidden'); showAutoLogin(); });

        async function verifyPassword(uid, pass) {
            return db.ref('users/' + uid).once('value').then(snap => {
                const data = snap.val();
                if (!data) return { error: 'Пользователь не найден' };
                if (data.pass !== pass) return { error: 'Неверный пароль' };
                if (data.frozen && Date.now() < data.frozen) return { error: 'frozen', until: data.frozen };
                return { success: true, data };
            });
        }

        async function doLogin() {
            const rawId = $('authId').value.trim(), pass = $('authPass').value.trim();
            $('authError').textContent = ''; $('authSuccess').textContent = '';
            if (!rawId || !pass) { $('authError').textContent = 'Введи ID и пароль'; return; }
            const uid = rawId.startsWith('@') ? rawId : '@' + rawId;
            const result = await verifyPassword(uid, pass);
            if (result.error) { if (result.error === 'frozen') { showFrozenScreen(result.until); return; } $('authError').textContent = result.error; return; }
            currentUser = { id: uid, name: result.data.name, isAdmin: (uid === ADMIN_ID) };
            db.ref('users/' + uid).update({ online: true });
            db.ref('users/' + uid).onDisconnect().update({ online: false });
            viewingProfile = uid;
            saveCurrentUser(uid, result.data.name, uid === ADMIN_ID);
            $('authSuccess').textContent = '✓ Вход!'; setTimeout(enterApp, 200);
        }

        async function doRegister() {
            const name = $('authName').value.trim(), rawId = $('authId').value.trim(), pass = $('authPass').value.trim();
            $('authError').textContent = ''; $('authSuccess').textContent = '';
            if (!name || !rawId || !pass) { $('authError').textContent = 'Заполни все поля'; return; }
            const uid = rawId.startsWith('@') ? rawId : '@' + rawId;
            const saved = loadSavedUser();
            if (saved && saved.uid !== uid) { $('authError').textContent = '❌ На этом устройстве уже есть аккаунт!'; return; }
            const snap = await db.ref('users/' + uid).once('value');
            if (snap.val()) { $('authError').textContent = '❌ Этот ID уже занят!'; return; }
            await db.ref('users/' + uid).set({ name, pass, online: true, coins: (uid === ADMIN_ID) ? 999999 : 0, gifts: {} });
            db.ref('users/' + uid).onDisconnect().update({ online: false });
            currentUser = { id: uid, name, isAdmin: (uid === ADMIN_ID) };
            viewingProfile = uid;
            saveCurrentUser(uid, name, uid === ADMIN_ID);
            $('authSuccess').textContent = '✓ Аккаунт создан!'; setTimeout(enterApp, 200);
        }

        $('loginBtn').addEventListener('click', doLogin);
        $('registerBtn').addEventListener('click', doRegister);
        $('authPass').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });

        function enterApp() {
            $('authScreen').classList.add('hidden'); $('messenger').classList.remove('hidden');
            $('userBadge').textContent = currentUser.name;
            $('adminBadge').classList.toggle('hidden', currentUser.id !== ADMIN_ID);
            updateCoins(); switchTab('chats'); watchMessages();
        }

        function logout() {
            Object.values(liveTimers).forEach(t => clearInterval(t));
            liveTimers = {}; lastMsgCount = {};
            if (currentUser) db.ref('users/' + currentUser.id).update({ online: false });
            currentUser = null; activeChat = null;
            $('messenger').classList.add('hidden'); $('authScreen').classList.remove('hidden');
            showAutoLogin();
        }

        function updateCoins() { db.ref('users/' + currentUser.id + '/coins').once('value', snap => { $('coinsBadge').textContent = '💎' + (snap.val() || 0); }); }

        function switchTab(tab) {
            $('chatsScreen').classList.add('hidden'); $('chatScreen').classList.add('hidden'); $('profileScreen').classList.add('hidden');
            $('navChats').classList.remove('active'); $('navProfile').classList.remove('active');
            if (tab === 'chats') { $('chatsScreen').classList.remove('hidden'); $('navChats').classList.add('active'); activeChat=null; loadContacts(); }
            else { $('profileScreen').classList.remove('hidden'); $('navProfile').classList.add('active'); renderProfile(viewingProfile || currentUser.id); }
        }

        $('navChats').addEventListener('click', () => switchTab('chats'));
        $('navProfile').addEventListener('click', () => { viewingProfile = currentUser.id; switchTab('profile'); });
        window.viewProfile = function(uid) { viewingProfile = uid; switchTab('profile'); renderProfile(uid); };

        function loadContacts() {
            db.ref('contacts/' + currentUser.id).on('value', snap => {
                const conts = snap.val() || [];
                if (!conts.length) { $('chatList').innerHTML = '<div class="empty-chats">Найди друга</div>'; return; }
                Promise.all(conts.map(uid => db.ref('users/' + uid).once('value'))).then(results => {
                    $('chatList').innerHTML = results.map((s, i) => ({ id: conts[i], ...s.val() })).filter(u => u && u.name).map(u => `
                        <div class="chat-item">
                            <div class="avatar" onclick="viewProfile('${u.id}')">${u.name[0].toUpperCase()}</div>
                            <div class="chat-info" onclick="openChat('${u.id}')"><div class="chat-name"><span class="online-dot" style="background:${u.online?'#2ecc71':'#6e6e8a'}"></span>${u.name}</div></div>
                            <button class="btn btn-small btn-purple" onclick="viewProfile('${u.id}')">👤</button>
                        </div>`).join('');
                });
            });
        }

        $('searchBtn').addEventListener('click', () => {
            const sid = ($('searchInput').value.trim().startsWith('@')?'':'@') + $('searchInput').value.trim();
            if (!sid || sid===currentUser.id) return;
            db.ref('users/'+sid).once('value', snap => {
                if (!snap.val()) { alert('Не найден'); return; }
                db.ref('contacts/'+currentUser.id).once('value', cs => {
                    const conts = cs.val() || [];
                    if (conts.includes(sid)) { alert('Уже в контактах'); return; }
                    conts.push(sid); db.ref('contacts/'+currentUser.id).set(conts);
                    db.ref('contacts/'+sid).once('value', s2 => { const c2=s2.val()||[]; if(!c2.includes(currentUser.id))c2.push(currentUser.id); db.ref('contacts/'+sid).set(c2); });
                    $('searchInput').value=''; alert('✅ Добавлен!');
                });
            });
        });

        // ⌨️ СТАТУС ПЕЧАТАНИЯ
        function setTypingStatus() {
            if (!activeChat) return;
            const cid = [currentUser.id, activeChat].sort().join('_');
            db.ref('typing/' + cid).set({ uid: currentUser.id, time: Date.now() });
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => { db.ref('typing/' + cid).remove(); }, 3000);
        }

        function openChat(uid) {
            db.ref('users/'+uid).once('value', snap => {
                if (!snap.val()) return;
                if (activeChat) {
                    const oldCid = [currentUser.id, activeChat].sort().join('_');
                    db.ref('typing/' + oldCid).remove();
                }
                activeChat=uid; const u=snap.val();
                $('chatsScreen').classList.add('hidden'); $('chatScreen').classList.remove('hidden');
                $('chatAvatar').textContent=u.name[0].toUpperCase(); $('chatName').textContent=u.name;
                $('typingStatus').textContent = u.online ? '🟢 онлайн' : '⚫ офлайн';
                $('typingStatus').style.color = '#8e8ea0';
                $('adminMenuBtn').classList.toggle('hidden', !(currentUser.id === ADMIN_ID && uid !== currentUser.id));
                
                // Слушаем статус печатания
                const cid = [currentUser.id, uid].sort().join('_');
                db.ref('typing/' + cid).on('value', snap => {
                    const data = snap.val();
                    if (data && data.uid !== currentUser.id && Date.now() - data.time < 4000) {
                        $('typingStatus').textContent = '⌨️ печатает...';
                        $('typingStatus').style.color = '#2ecc71';
                    } else {
                        $('typingStatus').textContent = u.online ? '🟢 онлайн' : '⚫ офлайн';
                        $('typingStatus').style.color = '#8e8ea0';
                    }
                });
                
                loadMessages(); $('messageInput').value=''; $('messageInput').focus();
            });
        }

        $('messageInput').addEventListener('input', setTypingStatus);

        $('adminMenuBtn').addEventListener('click', () => {
            if (currentUser.id !== ADMIN_ID || !activeChat) return;
            db.ref('users/'+activeChat).once('value', snap => {
                const u=snap.val(); if(!u)return;
                const isFrozen = u.frozen && Date.now() < u.frozen;
                const m=document.createElement('div');
                m.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;';
                m.innerHTML=`<div style="background:#242436;border-radius:16px;padding:20px;width:90%;max-width:300px;"><h3>👑 ${u.name}</h3><button class="btn btn-red" id="ad">🗑 Удалить</button>${isFrozen?'<button class="btn btn-green" id="au">✅ Разморозить</button>':'<button class="btn btn-orange" id="af">❄️ Заморозить</button>'}<button class="btn" style="background:#3a3a50;margin-top:8px;" id="ac">Отмена</button></div>`;
                document.body.appendChild(m);
                document.getElementById('ac').addEventListener('click',()=>m.remove());
                document.getElementById('ad').addEventListener('click',()=>{if(confirm('Удалить?')){db.ref('users/'+activeChat).remove();m.remove();activeChat=null;switchTab('chats');}});
                if(isFrozen){document.getElementById('au').addEventListener('click',()=>{db.ref('users/'+activeChat+'/frozen').remove();m.remove();alert('✅ Разморожен!');loadContacts();});}
                else{document.getElementById('af').addEventListener('click',()=>{
                    const fm=document.createElement('div');
                    fm.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:101;display:flex;align-items:center;justify-content:center;';
                    fm.innerHTML=`<div style="background:#242436;border-radius:16px;padding:20px;width:90%;max-width:300px;"><h3>❄️ ${u.name}</h3><div style="display:flex;gap:8px;"><input type="number" id="fv" value="1" min="1" style="flex:1;padding:12px;border-radius:12px;border:1px solid #3a3a50;background:#1e1e30;color:white;"><select id="fu" style="width:80px;padding:12px;border-radius:12px;border:1px solid #3a3a50;background:#1e1e30;color:white;"><option value="minutes">Мин</option><option value="hours">Часы</option><option value="days">Дни</option></select></div><button class="btn btn-orange" id="fg">❄️ Заморозить</button><button class="btn" style="background:#3a3a50;margin-top:8px;" id="fc">Отмена</button></div>`;
                    document.body.appendChild(fm);
                    document.getElementById('fc').addEventListener('click',()=>fm.remove());
                    document.getElementById('fg').addEventListener('click',()=>{
                        const v=parseInt(document.getElementById('fv').value)||1;
                        const ms=document.getElementById('fu').value==='minutes'?v*60000:document.getElementById('fu').value==='hours'?v*3600000:v*86400000;
                        db.ref('users/'+activeChat).update({frozen:Date.now()+ms});
                        fm.remove();m.remove();alert('✅ Заморожен!');loadContacts();
                    });
                });}
            });
        });

        function loadMessages() {
            if(!activeChat)return;
            db.ref('messages/'+[currentUser.id,activeChat].sort().join('_')).limitToLast(50).on('value',snap=>{
                $('messagesContainer').innerHTML=Object.values(snap.val()||{}).map(msg=>{
                    if(msg.photoURL) return `<div class="msg ${msg.from===currentUser.id?'msg-out':'msg-in'}">${msg.from!==currentUser.id?`<div class="msg-sender">${msg.fromName}</div>`:''}<img src="${msg.photoURL}" onclick="window.open(this.src)"><div class="msg-time">${msg.time}</div></div>`;
                    return `<div class="msg ${msg.from===currentUser.id?'msg-out':'msg-in'}">${msg.from!==currentUser.id?`<div class="msg-sender">${msg.fromName}</div>`:''}<div>${msg.text}</div><div class="msg-time">${msg.time}</div></div>`;
                }).join('');
                $('messagesContainer').scrollTop=$('messagesContainer').scrollHeight;
            });
        }

        function sendMessage() {
            if(!activeChat)return;
            const text=$('messageInput').value.trim();if(!text)return;
            db.ref('messages/'+[currentUser.id,activeChat].sort().join('_')).push({from:currentUser.id,fromName:currentUser.name,text,time:new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})});
            $('messageInput').value='';
            // Очищаем статус печатания
            const cid = [currentUser.id, activeChat].sort().join('_');
            db.ref('typing/' + cid).remove();
        }

        $('attachBtn').addEventListener('click', () => $('fileInput').click());
        $('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file || !activeChat) return;
            if (file.size > 500 * 1024) { alert('❌ Макс 500 КБ'); return; }
            const reader = new FileReader();
            reader.onload = function(ev) {
                db.ref('messages/'+[currentUser.id,activeChat].sort().join('_')).push({from:currentUser.id,fromName:currentUser.name,photoURL:ev.target.result,time:new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})});
            };
            reader.readAsDataURL(file);
            $('fileInput').value = '';
        });

        $('sendBtn').addEventListener('click', sendMessage);
        $('messageInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
        
        $('backBtn').addEventListener('click', () => {
            if (activeChat) {
                const cid = [currentUser.id, activeChat].sort().join('_');
                db.ref('typing/' + cid).remove();
            }
            switchTab('chats');
        });

        function getTimerId(prefix, id) { return prefix + '_' + (id || '').replace(/[^a-zA-Z0-9]/g, '_'); }

        function renderProfile(uid) {
            db.ref('users/'+uid).once('value',snap=>{
                const u=snap.val();if(!u)return;
                const isMe = uid === currentUser.id;
                const g=Object.values(u.gifts||{});
                $('profileContent').innerHTML=`
                    <div class="profile-avatar">${u.name[0].toUpperCase()}</div>
                    <div class="profile-name">${u.name} ${u.online?'🟢':''} ${u.frozen&&Date.now()<u.frozen?'❄️':''}</div>
                    <div class="profile-id">${uid}</div>
                    <div class="profile-coins">💎 ${u.coins||0} Чаткоинов</div>
                    <div class="section-title">🎁 Подарки (${g.length})</div>
                    <div class="my-gifts">${g.length?g.map(x=>`<div class="my-gift ${x.rare?'rare':''}">${x.icon}</div>`).join(''):'<span style="color:#6e6e8a;">Нет</span>'}</div>
                    ${!isMe ? `
                        <button class="btn btn-purple" onclick="openChat('${uid}')">💬 Написать</button>
                        <button class="btn btn-gold" onclick="giftToUser('${uid}')" style="margin-top:8px;">🎁 Подарить подарок</button>
                    ` : `
                        <div class="notif-settings">
                            <label>🔔 Уведомления</label>
                            <div class="notif-toggle ${notificationsEnabled?'on':''}" id="notifToggle" onclick="toggleNotifications()"></div>
                        </div>
                        <div class="section-title">🛍️ ОБЫЧНЫЕ ПОДАРКИ</div><div class="gift-grid" id="giftGrid"></div>
                        <div class="section-title" style="color:#f39c12;">🔥 ЛИМИТИРОВАННЫЕ ПОДАРКИ</div><div class="gift-grid" id="limitedGiftGrid"></div>
                        <div class="section-title">📋 Задания</div><div class="task-list" id="taskList"></div>
                        ${currentUser.id===ADMIN_ID?`<button class="btn btn-orange btn-small" id="atb">+ Задание</button><button class="btn btn-gold btn-small" id="agb">+ Подарок</button><button class="btn btn-red btn-small" id="algb">🔥 + Лимит. подарок</button>`:''}
                    `}
                    <button class="btn btn-red" id="plb">🚪 Выйти</button>`;
                $('plb').addEventListener('click', logout);
                if(isMe){
                    db.ref('gifts').once('value',snap=>{const gifts=snap.val()||{},el=$('giftGrid'),now=Date.now();if(el){el.innerHTML='';Object.entries(gifts).forEach(([id,g])=>{if(g.expires&&now>g.expires){db.ref('gifts/'+id).remove();return;}const timerId=getTimerId('gift',id);const div=document.createElement('div');div.className='gift-card';div.innerHTML=`<div class="gift-icon">${g.icon}</div><div class="gift-name">${g.name}</div><div class="gift-price">💎${g.price}</div>${g.expires?`<div class="gift-timer" id="${timerId}"></div>`:''}<button class="btn btn-orange btn-small buy-gift" data-icon="${g.icon}" data-price="${g.price}">Купить</button>`;el.appendChild(div);if(g.expires)startLiveTimer(timerId,g.expires);});if(el)el.querySelectorAll('.buy-gift').forEach(b=>b.addEventListener('click',()=>{db.ref('users/'+currentUser.id+'/coins').once('value',snap=>{if((snap.val()||0)<parseInt(b.dataset.price)){alert('❌ Мало 💎');return;}db.ref('users/'+currentUser.id+'/coins').set(snap.val()-parseInt(b.dataset.price));db.ref('users/'+currentUser.id+'/gifts').push({icon:b.dataset.icon});alert('✅ Куплено!');renderProfile(currentUser.id);updateCoins();});}));}});
                    db.ref('limitedGifts').once('value',snap=>{const gifts=snap.val()||{},el=$('limitedGiftGrid'),now=Date.now();if(el){el.innerHTML='';Object.entries(gifts).forEach(([id,g])=>{if(g.expires&&now>g.expires){db.ref('limitedGifts/'+id).remove();return;}const sold=g.sold||0,left=g.stock-sold;if(left<=0)return;const timerId=getTimerId('lim',id);const div=document.createElement('div');div.className='gift-card limited';div.innerHTML=`<div class="gift-badge">🔥</div><div class="gift-icon">${g.icon}</div><div class="gift-name">${g.name}</div><div class="gift-price">💎${g.price}</div><div class="gift-stock">Осталось: ${left}/${g.stock}</div>${g.expires?`<div class="gift-timer" id="${timerId}"></div>`:''}<button class="btn btn-gold btn-small buy-limited" data-id="${id}" data-icon="${g.icon}" data-price="${g.price}">Купить</button>`;el.appendChild(div);if(g.expires)startLiveTimer(timerId,g.expires);});if(el)el.querySelectorAll('.buy-limited').forEach(b=>b.addEventListener('click',()=>{const gid=b.dataset.id,icon=b.dataset.icon,price=parseInt(b.dataset.price);db.ref('limitedGifts/'+gid).once('value',snap=>{const g=snap.val();if(!g||(g.sold||0)>=g.stock){alert('❌ Раскуплен!');renderProfile(currentUser.id);return;}db.ref('users/'+currentUser.id+'/coins').once('value',snap=>{if((snap.val()||0)<price){alert('❌ Мало 💎');return;}db.ref('users/'+currentUser.id+'/coins').set(snap.val()-price);db.ref('limitedGifts/'+gid+'/sold').set((g.sold||0)+1);db.ref('users/'+currentUser.id+'/gifts').push({icon:icon,rare:true});alert('✅ Куплен лимитированный подарок! 🔥');renderProfile(currentUser.id);updateCoins();});});}));}});
                    db.ref('tasks').once('value',snap=>{const tasks=snap.val()||{},el=$('taskList'),now=Date.now();if(el){el.innerHTML='';Object.entries(tasks).forEach(([id,t])=>{if(t.expires&&now>t.expires){db.ref('tasks/'+id).remove();return;}const done=t.doneBy&&t.doneBy[currentUser.id];const timerId=getTimerId('task',id);const div=document.createElement('div');div.className='task-item';div.innerHTML=`<div class="task-info"><div class="task-name">${t.name}</div><div class="task-reward">💎+${t.reward}</div>${t.expires?`<div class="task-expires" id="${timerId}"></div>`:''}</div>${done?'<span style="color:#2ecc71;">✓</span>':`<button class="task-done" data-tid="${id}" data-reward="${t.reward}">Выполнить</button>`}`;el.appendChild(div);if(t.expires)startLiveTimer(timerId,t.expires);});if(el)el.querySelectorAll('.task-done').forEach(b=>b.addEventListener('click',()=>{db.ref('tasks/'+b.dataset.tid+'/doneBy/'+currentUser.id).set(true);db.ref('users/'+currentUser.id+'/coins').once('value',snap=>{db.ref('users/'+currentUser.id+'/coins').set((snap.val()||0)+parseInt(b.dataset.reward));renderProfile(currentUser.id);updateCoins();});}));}});
                    setTimeout(()=>{if(currentUser.id===ADMIN_ID){const atb=$('atb'),agb=$('agb'),algb=$('algb');
                        if(atb)atb.onclick=()=>{const n=prompt('Задание:');if(!n)return;const r=parseInt(prompt('💎:'))||10;const h=parseInt(prompt('Срок (минут, 0=без):'))||0;const t={name:n,reward:r,doneBy:{}};if(h>0)t.expires=Date.now()+h*60000;db.ref('tasks').push(t);renderProfile(currentUser.id);};
                        if(agb)agb.onclick=()=>{const n=prompt('Подарок:');if(n){const i=prompt('Эмодзи:');if(i){const h=parseInt(prompt('Срок (минут, 0=без):'))||0;const g={name:n,icon:i,price:parseInt(prompt('Цена 💎:'))||10};if(h>0)g.expires=Date.now()+h*60000;db.ref('gifts').push(g);}renderProfile(currentUser.id);}};
                        if(algb)algb.onclick=()=>{const n=prompt('Лимит. подарок:');if(!n)return;const i=prompt('Эмодзи:');if(!i)return;const p=parseInt(prompt('Цена 💎:'))||100;const s=parseInt(prompt('Тираж:'))||10;const h=parseInt(prompt('Срок (минут, 0=без):'))||0;const g={name:n,icon:i,price:p,stock:s,sold:0};if(h>0)g.expires=Date.now()+h*60000;db.ref('limitedGifts').push(g);alert('🔥 Лимитированный подарок создан!');renderProfile(currentUser.id);};
                    }},100);
                }
            });
        }

        window.giftToUser = function(toUid) {
            Promise.all([db.ref('gifts').once('value'),db.ref('limitedGifts').once('value')]).then(([snap1,snap2])=>{
                const gifts=snap1.val()||{},limited=snap2.val()||{},now=Date.now();
                let all=[];Object.entries(gifts).forEach(([id,g])=>{if(!g.expires||now<g.expires)all.push({id,...g,type:'Обычный'});});
                Object.entries(limited).forEach(([id,g])=>{if((!g.expires||now<g.expires)&&(g.sold||0)<g.stock)all.push({id,...g,type:'🔥 Лимит.'});});
                if(!all.length){alert('Нет доступных подарков!');return;}
                let list=all.map((g,i)=>`${i+1}. ${g.icon} ${g.name} (${g.type}) - 💎${g.price}`).join('\n');
                const choice=prompt(`Выбери подарок:\n${list}\nВведи номер:`);if(!choice)return;
                const idx=parseInt(choice)-1;if(idx<0||idx>=all.length){alert('Неверный номер!');return;}
                const gift=all[idx];
                db.ref('users/'+currentUser.id+'/coins').once('value',snap=>{const coins=snap.val()||0;if(coins<gift.price){alert('❌ Мало 💎');return;}db.ref('users/'+currentUser.id+'/coins').set(coins-gift.price);if(gift.type==='🔥 Лимит.')db.ref('limitedGifts/'+gift.id+'/sold').set((gift.sold||0)+1);db.ref('users/'+toUid+'/gifts').once('value',snap=>{const tg=snap.val()||[];tg.push({icon:gift.icon,rare:gift.type==='🔥 Лимит.'});db.ref('users/'+toUid+'/gifts').set(tg);db.ref('users/'+toUid).once('value',snap=>{alert(`✅ Подарок ${gift.icon} подарен ${snap.val().name}!`);renderProfile(toUid);updateCoins();});});});
            });
        };

        window.toggleNotifications = function() { notificationsEnabled = !notificationsEnabled; const t = $('notifToggle'); if (t) t.classList.toggle('on', notificationsEnabled); };

        showAutoLogin();
        const saved = loadSavedUser();
        if (saved) {
            db.ref('users/' + saved.uid).once('value', snap => {
                if (snap.val() && !(snap.val().frozen && Date.now() < snap.val().frozen)) autoLogin(saved.uid);
            });
        }
    </script>
</body>
</html>
